name: CI

on:
  push:
    branches:
      - main
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Unit and API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install Python version pinned by the project
        run: uv python install

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pytest
        run: uv run pytest