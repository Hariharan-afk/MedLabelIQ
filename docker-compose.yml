services:
  postgres:
    image: postgres:16-alpine
    container_name: medlabeliq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medlabeliq}
      POSTGRES_USER: ${POSTGRES_USER:-medlabeliq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medlabeliq}
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-medlabeliq} -d ${POSTGRES_DB:-medlabeliq}"
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:v1.15.5
    container_name: medlabeliq-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  bootstrap:
    profiles:
      - tools
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medlabeliq-bootstrap
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432

      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_URL: http://qdrant:6333

      HF_HOME: /app/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - hf_cache:/app/.cache/huggingface
    entrypoint:
      - uv
      - run
      - python
      - -m
      - medlabeliq.bootstrap.initialize_system

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medlabeliq-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432

      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_URL: http://qdrant:6333

      HF_HOME: /app/.cache/huggingface
    ports:
      - "8011:8011"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - hf_cache:/app/.cache/huggingface
    command: >
      uv run uvicorn medlabeliq.api.app:app
      --host 0.0.0.0
      --port 8011
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/health', timeout=3)\""
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 25s

  ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medlabeliq-ui
    restart: unless-stopped
    environment:
      MEDLABELIQ_API_BASE_URL: http://api:8011
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    command: >
      uv run streamlit run src/medlabeliq/ui/streamlit_app.py
      --server.address 0.0.0.0
      --server.port 8501
      --server.headless true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import socket; s=socket.create_connection(('127.0.0.1', 8501), timeout=3); s.close()\""
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

volumes:
  postgres_data:
  qdrant_data:
  hf_cache: