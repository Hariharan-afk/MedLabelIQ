version: 2
description: >
  Phase 1 smoke set for parser, metadata extraction, versioning, and section-aware chunking.
  Each entry is locked to a reviewed DailyMed SET ID and SPL version for reproducibility.

selection_defaults:
  name_type: both
  require_current: true
  prefer_current_human_drug_label: true
  manual_review_required_before_lock: true

drugs:
  - concept_name: acetaminophen
    query_name: acetaminophen
    name_type: generic
    target_profile: single-ingredient oral solid OTC baseline
    prefer_title_contains: ["ACETAMINOPHEN", "TABLET"]
    exclude_title_contains: ["BULK", "SUPPOSITORY", "ELIXIR", "SUSPENSION", "LIQUID", "CHILDREN", "PEDIATRIC"]
    set_id: "ee50c5ee-1a61-4efc-aca9-42d897d6a3b8"
    locked_spl_version: 8
    locked_published_date: "2026-04-30"
    locked_title: "ACETAMINOPHEN TABLET [CARDINAL HEALTH 107, LLC]"
    lock_reason: "Clean single-ingredient tablet label; intentionally retained as OTC Drug Facts parser stress case."
    notes: "common OTC analgesic; simple baseline"

