    expected_cited_heading_any: []
    minimum_citations: 0

  - id: acetaminophen_bacterial_infection_abstain
    query: Does acetaminophen cure bacterial infections?
    drug: acetaminophen
    family: null
    expected_status: insufficient_evidence
    expected_response_any:
      - not sufficient
      - insufficient
    expected_cited_heading_any: []
    minimum_citations: 0