    expected_response_any:
      - not sufficient
      - insufficient
    expected_cited_heading_any: []
    minimum_citations: 0

  - id: omeprazole_eyesight_abstain
    query: Does omeprazole improve eyesight?
    drug: omeprazole
    family: null
    expected_status: insufficient_evidence
    expected_response_any:
      - not sufficient
