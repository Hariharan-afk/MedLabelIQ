      - insufficient
    expected_cited_heading_any: []
    minimum_citations: 0

  - id: atorvastatin_relieve_muscle_cramps_abstain
    query: Does atorvastatin relieve muscle cramps?
    drug: atorvastatin
    family: null
    expected_status: insufficient_evidence
    expected_response_any:
      - not sufficient
      - insufficient
    expected_cited_heading_any: []
    minimum_citations: 0

  - id: isotretinoin_whiten_teeth_abstain
    query: Does isotretinoin whiten teeth?
    drug: isotretinoin
    family: null
    expected_status: insufficient_evidence
    expected_response_any:
      - not sufficient
      - insufficient
    expected_cited_heading_any: []
    minimum_citations: 0