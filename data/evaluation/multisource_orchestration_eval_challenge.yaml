  # ---------------------------------------------------------------------------
  # MIXED-SOURCE STRESS CASES
  #
  # These combine RxNorm identity intent with DailyMed clinical intent.
  # Current source_router should mark them as ambiguous_mixed_source and select
  # DailyMed as the fallback execution branch. We conservatively expect
  # insufficient_evidence unless the system can fully support the combined claim.
  # ---------------------------------------------------------------------------

