version: 1
description: >
  Harder multi-source orchestration benchmark for MedLabelIQ.
  This challenge set stresses source routing, brand/generic normalization,
  unsupported identity claims, brand-name clinical queries, and mixed-source
  questions that combine RxNorm identity intent with DailyMed clinical intent.

cases:
  # ---------------------------------------------------------------------------
  # RXNORM IDENTITY — SUPPORTED
  # ---------------------------------------------------------------------------

  - id: rxnorm_eliquis_another_name_for_apixaban
    query: Is Eliquis another name for apixaban?
    drug: null
    family: null
    expected_status: answered
    expected_source: rxnorm_identity
    expected_source_route_status: routed_rxnorm_identity
    expected_family_plan_status: no_route_detected
    expected_response_any:
      - same ingredient concept
      - apixaban
    minimum_citations: 2
    citation_prefix: R
    minimum_identity_evidence: 2
    maximum_label_evidence: 0

  - id: rxnorm_glucophage_equivalent_to_metformin
    query: Is Glucophage equivalent to metformin?
