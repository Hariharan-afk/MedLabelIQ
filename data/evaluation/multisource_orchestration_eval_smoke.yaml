version: 1
description: >
  Smoke evaluation set for MedLabelIQ multi-source orchestration.
  This benchmark evaluates end-to-end routing across DailyMed label QA
  and RxNorm identity QA, including source selection, family planning,
  final answer status, citation behavior, and evidence-channel correctness.

cases:
  # ---------------------------------------------------------------------------
  # RXNORM IDENTITY ANSWER PATH
  # ---------------------------------------------------------------------------

  - id: rxnorm_eliquis_apixaban_equivalence_answered
    query: Is Eliquis the same as apixaban?
    drug: null
    family: null
    expected_status: answered
    expected_source: rxnorm_identity
    expected_source_route_status: routed_rxnorm_identity
    expected_family_plan_status: no_route_detected
    expected_response_any:
      - same ingredient concept
      - apixaban
    minimum_citations: 2
    citation_prefix: R
    minimum_identity_evidence: 2
    maximum_label_evidence: 0

  - id: rxnorm_glucophage_generic_answered
    query: What is the generic name of Glucophage?
